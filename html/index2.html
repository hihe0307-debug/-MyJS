<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mini MyJS</title>

  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="box">

  <h2 id="title">
    Xin chào JavaScript
  </h2>


  <button id="btnChange">
    Đổi nội dung
  </button>


  <button id="btnToggle">
    Ẩn/hiện mô tả
  </button>


  <p id="desc">
    Đây là đoạn mô tả để em thực hành DOM và sự kiện.
  </p>



  <form id="contactForm">

    <input 
      id="fullName" 
      type="text" 
      placeholder="Nhập họ tên"
    >

    <button type="submit">
      Gửi
    </button>

  </form>


  <p id="message"></p>


</div>


<script src="../js/script.js"></script>

</body>
</html>
