<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Website MyJS</title>

  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>

  <h1>Website MyJS</h1>

  <nav>
    <a href="#">Trang chủ</a>
    <a href="#">Giới thiệu</a>
    <a href="#">Liên hệ</a>
  </nav>

</header>



<section>

  <h2>Giới thiệu</h2>

  <button id="btnToggle">
    Ẩn/Hiện nội dung
  </button>


  <p id="content">
    Đây là website thực hành JavaScript cơ bản.
    JavaScript giúp trang web có tương tác.
  </p>

</section>




<section>

  <h2>Form liên hệ</h2>


  <form id="contactForm">

    <input 
      id="name" 
      type="text" 
      placeholder="Nhập họ tên"
    >


    <input 
      id="email" 
      type="text" 
      placeholder="Nhập email"
    >


    <button type="submit">
      Gửi
    </button>

  </form>


  <p id="message"></p>

</section>



<script src="../js/script.js"></script>

</body>
</html>
