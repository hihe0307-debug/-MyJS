<!DOCTYPE html>
<html lang="vi">
<head>

  <title>Internal JavaScript</title>
</head>

<body>

<h2>Internal JavaScript</h2>

<button id="btn">
  Bấm vào đây
</button>

  alert("Xin chào từ Internal JS!");
});

</script>

</body>
</html>
