<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Event Playground</title>
</head>

<body>

<h1>Event Playground</h1>


<!-- CLICK -->
<h3>1. Click</h3>

<button id="btnClick">
  Bấm nút
</button>

<p id="clickResult"></p>



<!-- CHANGE -->
<h3>2. Change</h3>

<select id="colorSelect">
  <option value="Đỏ">Đỏ</option>
  <option value="Xanh">Xanh</option>
  <option value="Vàng">Vàng</option>
</select>

<p id="colorResult"></p>



<!-- KEYUP -->
<h3>3. Keyup</h3>

<input id="nameInput" type="text" placeholder="Nhập tên">

<p id="preview"></p>



<!-- SUBMIT -->
<h3>4. Submit</h3>

<form id="myForm">

  <input id="email" type="text" placeholder="Nhập email">

  <button type="submit">
    Gửi
  </button>

</form>

<p id="formResult"></p>



<script src="../js/events.js"></script>

</body>
</html>
